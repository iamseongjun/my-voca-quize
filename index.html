            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);

            height: 100vh; margin: 0; color: #333;
        }
        
        /* 메인 앱 컨테이너: 둥글고 부드러운 그림자 (모던 앱 스타일) */
        .app-container { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            width: 100%; max-width: 420px; height: 90vh; max-height: 800px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            display: flex; flex-direction: column; 
            padding: 40px 25px; box-sizing: border-box; 
            text-align: center; overflow-y: auto; 
        }
        h1 { color: #2c3e50; font-size: 26px; font-weight: 800; margin-top: 0; margin-bottom: 25px; }
        
        /* 입력창 디자인 */
        #start-screen { display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .input-label { font-size: 14px; color: #5a6c7d; font-weight: 700; text-align: left; margin-bottom: 8px; margin-left: 8px; }
        .input-box { 
            padding: 16px; font-size: 16px; border: 2px solid #e1e8ed; 
            border-radius: 14px; margin-bottom: 20px; text-align: center; 
            outline: none; width: 100%; box-sizing: border-box; 
            background-color: #f8faff; transition: all 0.3s ease; 
            color: #2c3e50; font-weight: 500;
        }
        .input-box:focus { border-color: #5b86e5; box-shadow: 0 0 0 4px rgba(91,134,229,0.1); background-color: #fff; }
        
        /* 메인 버튼: 트렌디한 그라데이션 및 호버 애니메이션 */
        .start-btn { 
            background: linear-gradient(135deg, #36d1dc 0%, #5b86e5 100%); 
            color: white; border: none; padding: 18px; font-size: 18px; font-weight: bold; 
            border-radius: 14px; cursor: pointer; margin-top: 10px; 
            transition: transform 0.2s, box-shadow 0.2s; 
            box-shadow: 0 4px 15px rgba(91,134,229,0.3); 
        }
        .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(91,134,229,0.4); }
        .start-btn:active { transform: translateY(1px); }
        .admin-link { margin-top: 30px; font-size: 14px; color: #95a5a6; text-decoration: none; cursor: pointer; background: none; border: none; font-weight: 600; transition: color 0.2s; }
        .admin-link:hover { color: #34495e; }
        
        /* 퀴즈 화면 디자인 */
        .question-box { background-color: #f0f4f8; border-radius: 20px; padding: 35px 20px; margin-bottom: 25px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .question-type { font-size: 15px; color: #7f8c8d; margin-bottom: 15px; font-weight: 700; }
        .question-text { font-size: 34px; font-weight: 800; color: #2c3e50; word-break: keep-all; }
        
        /* 객관식 버튼 */
        .options-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .option-btn { 
            background-color: white; color: #34495e; border: 2px solid #e1e8ed; 
            padding: 18px; font-size: 17px; font-weight: bold; 
            border-radius: 14px; cursor: pointer; transition: all 0.2s; 
        }
        .option-btn:hover { background-color: #f8faff; border-color: #5b86e5; color: #5b86e5; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* 주관식 입력 */
        .typing-container { display: none; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        
        /* 결과 화면 및 오답 노트 */
        .wrong-list { text-align: left; background: #fff5f5; padding: 20px; border-radius: 16px; margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #ffe3e3; }
        .wrong-item { margin-bottom: 15px; font-size: 15px; border-bottom: 1px dashed #ffc9c9; padding-bottom: 15px; }
        .wrong-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .correct-text { color: #20c997; font-weight: bold; background: #e6fcf5; padding: 2px 6px; border-radius: 4px; }
        .wrong-text { color: #ff6b6b; text-decoration: line-through; background: #fff0f0; padding: 2px 6px; border-radius: 4px; }

        /* 관리자 화면 */
        #admin-screen { display: none; text-align: left; }
        .record-card { background: white; padding: 18px; border-radius: 14px; margin-bottom: 15px; font-size: 14px; border: 1px solid #e1e8ed; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .record-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #f0f4f8; padding-bottom: 8px; font-size: 15px; }

        .close-admin-btn { background: #95a5a6; box-shadow: none; }

    </style>
</head>

    function startQuiz() {
        const name = nameInput.value.trim();
        if (name === "") { alert("이름을 꼭 입력해주세요!"); return; }
        
        // 선택한 카테고리 가져오기
        const selectedCategory = document.getElementById('category-select').value;
        currentCategoryName = selectedCategory;

        // 선택한 카테고리에 맞춰 단어 리스트 걸러내기
        if (selectedCategory === "전체") {

        } else {
            currentQuizList = fullWordDatabase.filter(word => word.category === selectedCategory);
        }

        // 객관식 퀴즈이므로 4개 미만이면 진행 불가 처리

            return;
        }

        // 시험 순서 무작위 섞기 (원치 않으시면 이 줄을 삭제하세요)
        shuffleArray(currentQuizList);

        currentUser = name; currentQuestionIndex = 0; score = 0; incorrectWords = [];
        
        document.getElementById('quiz-title').innerText = `📝 [${selectedCategory}] 진행 중`;
        startScreen.style.display = 'none'; quizScreen.style.display = 'flex';
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= currentQuizList.length) { endQuiz(); return; }
        const currentWord = currentQuizList[currentQuestionIndex];
        const isEnToKo = Math.random() > 0.5;
        let questionText, correctOption;

        if (isEnToKo) { document.getElementById('question-type').innerText = "다음 영단어의 뜻은?"; questionText = currentWord.en; correctOption = currentWord.ko; } 
        else { document.getElementById('question-type').innerText = "다음 뜻을 가진 영단어는?"; questionText = currentWord.ko; correctOption = currentWord.en; }

        document.getElementById('question-text').innerText = questionText;
        currentCorrectAnswer = correctOption;

        let wrongWords = currentQuizList.filter(word => word !== currentWord);
        wrongWords = shuffleArray(wrongWords).slice(0, 3);
        let wrongOptions = wrongWords.map(word => isEnToKo ? word.ko : word.en);
        let allOptions = shuffleArray([correctOption, ...wrongOptions]);

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";
        allOptions.forEach(optionText => {
            const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = optionText;
            btn.onclick = () => checkAnswer(optionText, currentWord); optionsContainer.appendChild(btn);
        });
        document.getElementById('status-bar').innerText = `진행 상황: ${currentQuestionIndex + 1} / ${currentQuizList.length}`;
    }

    function checkAnswer(selectedOption, currentWordData) {
        if (selectedOption === currentCorrectAnswer) { score++; } 
        else { incorrectWords.push({ word: `${currentWordData.en} (${currentWordData.ko})`, studentAnswer: selectedOption, correctAnswer: currentCorrectAnswer }); }
        currentQuestionIndex++; loadQuestion();
    }

    function endQuiz() {
        quizScreen.style.display = 'none'; resultScreen.style.display = 'block';
        document.getElementById('display-name').innerText = currentUser;
        document.getElementById('result-category').innerText = `[${currentCategoryName} 테스트]`;
        document.getElementById('total-count').innerText = currentQuizList.length;
        document.getElementById('correct-count').innerText = score;

        const wrongContainer = document.getElementById('wrong-list-container'), wrongListEl = document.getElementById('wrong-list');
        wrongListEl.innerHTML = "";
        if (incorrectWords.length > 0) {
            wrongContainer.style.display = "block";
            incorrectWords.forEach(item => {
                wrongListEl.innerHTML += `<div class="wrong-item"><strong>${item.word}</strong><br>내가 고른 답: <span class="wrong-text">${item.studentAnswer}</span><br>정답: <span class="correct-text">${item.correctAnswer}</span></div>`;
            });
        } else { wrongContainer.style.display = "none"; }

        saveRecordToServer();
    }

    // ⭐️ [변경] 서버로 보낼 때 'category' 정보도 함께 보냄
    async function saveRecordToServer() {
        const record = { 
            name: currentUser, 
            category: currentCategoryName, // <--- 추가!
            date: new Date().toLocaleString(), 
            score: score, 
            total: currentQuizList.length, 
            wrong: incorrectWords 
        };
        try {
            await fetch('/api/records', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(record)
            });
        } catch (error) { console.error("서버 전송 실패:", error); }
    }

    function openAdmin() {
        const password = prompt("관리자 비밀번호를 입력하세요:");
        if (password === ADMIN_PASSWORD) {
            startScreen.style.display = 'none'; adminScreen.style.display = 'block';
            loadRecordsFromServer();
        } else if (password !== null) { alert("비밀번호가 틀렸습니다."); }
    }

    // ⭐️ [변경] 관리자 화면에 과목(카테고리) 뱃지 표시
    async function loadRecordsFromServer() {
        const recordsContainer = document.getElementById('records-container');
        recordsContainer.innerHTML = "<p>서버에서 기록을 불러오는 중...</p>";
        
        try {
            const response = await fetch('/api/records');
            const savedRecords = await response.json();
            
            recordsContainer.innerHTML = "";
            if (savedRecords.length === 0) {
                recordsContainer.innerHTML = "<p style='color:#888;'>아직 시험 기록이 없습니다.</p>";
                return;
            }

            savedRecords.slice().reverse().forEach(record => {
                // 카테고리 텍스트 (예전 기록은 카테고리가 없을 수 있으므로 방어 코드 작성)
                const catText = record.category ? record.category : "기본";
                
                let wrongHTML = record.wrong.length > 0 ? `<div style="margin-top:5px; color:#dc3545; font-size:12px;">오답: ${record.wrong.map(w => w.word.split(' ')[0]).join(', ')}</div>` : `<div style="margin-top:5px; color:#28a745; font-size:12px;">백점! 🎉</div>`;
                recordsContainer.innerHTML += `
                <div class="record-card">
                    <span class="category-badge">${catText}</span>
                    <div class="record-header">
                        <span>👤 ${record.name}</span>
                        <span>${record.score} / ${record.total} 점</span>
                    </div>
                    <div style="font-size: 11px; color: #888;">${record.date}</div>
                    ${wrongHTML}
                </div>`;
            });
        } catch (error) { recordsContainer.innerHTML = "<p>기록을 불러오지 못했습니다.</p>"; }
    }

    async function clearRecords() {
        if(confirm("모든 학생의 기록을 정말 삭제하시겠습니까? (복구 불가)")) {
            await fetch('/api/records', { method: 'DELETE' });
            loadRecordsFromServer();
            alert("서버의 기록이 완전히 삭제되었습니다.");
        }
    }
let isPaused = false;

    // 1. 이전 문제로 돌아가기
    function goBack() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        } else {
            alert("첫 번째 문제입니다!");
        }
    }

    // 2. 일시정지/재개
    function togglePause() {
        const pauseBtn = document.getElementById('pause-btn');
        const quizContent = document.getElementById('options-container'); // 혹은 주관식 영역
        
        isPaused = !isPaused;
        if (isPaused) {
            quizContent.style.filter = "blur(10px)"; // 화면 흐리게
            pauseBtn.innerText = "▶️ 재개하기";
        } else {
            quizContent.style.filter = "none"; // 화면 복구
            pauseBtn.innerText = "⏸️ 일시정지";
        }
    }
</script>
